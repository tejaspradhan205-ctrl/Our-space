<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUR SPACE — SIGNATURE V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --gold-primary: #d4af37;
            --gold-light: #f9f1cc;
            --gold-dark: #aa8429;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(212, 175, 55, 0.2);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --app-padding: 20px;
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        h1, h2, h3, .luxury-text {
            font-family: 'Playfair Display', serif;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px var(--glass-highlight);
        }

        /* --- PARTICLES --- */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- FULLSCREEN LAYOUTS --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* --- WELCOME & PASSWORD SCREEN --- */
        #welcome-screen, #password-screen {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            z-index: 100;
        }

        .brand-title {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-align: center;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn-luxury {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-light);
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-luxury::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-luxury:active::before {
            left: 100%;
        }

        .password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 80%;
            max-width: 300px;
        }

        .password-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--gold-dark);
            border-radius: 12px;
            padding: 15px;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        .password-input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .error-msg {
            color: #ff4c4c;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- APP MAIN CONTAINER --- */
        #app-main {
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }

        #app-main.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- APP SECTIONS --- */
        .app-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - var(--nav-height));
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--app-padding);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(20px);
            padding-bottom: 100px;
        }

        .app-section::-webkit-scrollbar {
            display: none;
        }

        .app-section.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* --- HERO SECTION (HOME) --- */
        #home {
            padding: 0;
            height: calc(100% - var(--nav-height));
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        .hero-content {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            text-align: left;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .hero-content p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .hero-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hero-card-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--gold-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-primary);
            font-size: 1.2rem;
        }

        .hero-card-text h4 {
            font-size: 1rem;
            font-weight: 500;
        }
        .hero-card-text p {
            margin: 0;
            font-size: 0.8rem;
        }

        /* --- SECTION HEADERS --- */
        .section-header {
            margin-bottom: 25px;
            margin-top: 20px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .section-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* --- GALLERY SYSTEM --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4/5;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transform: scale(1);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .gallery-item:active {
            transform: scale(0.95);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            font-size: 0.85rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* Gallery Modal */
        #image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #image-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        #modal-img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            border: 1px solid var(--gold-dark);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            color: var(--gold-primary);
            font-size: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* --- MUSIC SYSTEM --- */
        .player-container {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .album-art {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        .album-art.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }

        .song-title {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .song-artist {
            color: var(--gold-primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gold-primary);
            border-radius: 2px;
            width: 0%;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold-primary);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s, transform 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .play-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #aa8429);
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }

        .playlist-section {
            margin-top: 20px;
        }

        .playlist-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .playlist-item:active {
            background: rgba(255,255,255,0.05);
        }

        .playlist-item.active {
            border: 1px solid var(--gold-dark);
            background: rgba(212, 175, 55, 0.1);
        }

        .playlist-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--glass-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-primary);
            margin-right: 15px;
        }

        .playlist-info h4 {
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        .playlist-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* --- PDF LIBRARY --- */
        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px 15px 45px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
        }
        
        .search-bar:focus {
            border-color: var(--gold-primary);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .pdf-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pdf-card {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pdf-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pdf-icon {
            font-size: 2rem;
            color: #ff4c4c;
        }

        .pdf-details h4 {
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .pdf-details p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .btn-open {
            padding: 8px 16px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-primary);
            color: var(--gold-light);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        /* --- MEMORIES TIMELINE --- */
        .timeline {
            position: relative;
            padding-left: 30px;
            margin-top: 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--gold-primary), transparent);
        }

        .memory-card {
            position: relative;
            margin-bottom: 30px;
            padding: 20px;
        }

        .memory-card::before {
            content: '';
            position: absolute;
            left: -35px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--bg-color);
            border: 2px solid var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold-primary);
        }

        .memory-date {
            font-size: 0.8rem;
            color: var(--gold-primary);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .memory-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .memory-text {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
        }

        /* --- ABOUT SECTION --- */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
        }

        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, var(--gold-primary), transparent);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-image: url('shibani.png');
            background-size: cover;
            background-position: center;
        }

        .profile-name {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .profile-tagline {
            font-size: 0.9rem;
            color: var(--gold-primary);
        }

        .message-wall {
            padding: 20px;
            text-align: center;
            font-style: italic;
        }

        .quote-icon {
            font-size: 2rem;
            color: var(--glass-border);
            margin-bottom: 15px;
        }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
